name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve? Who needs it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work? Alternatives you considered?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Standards/RFCs involved, prior art in other identity providers, links.
