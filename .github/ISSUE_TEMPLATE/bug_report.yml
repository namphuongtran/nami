name: Bug report
description: Something doesn't work as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Security vulnerabilities must NOT be reported here.** Use [private reporting](https://github.com/namphuongtran/nami/security/advisories/new) instead (see SECURITY.md).
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. 0.1.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps, config, or code to reproduce.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, .NET version, PostgreSQL version, deployment (docker/k8s/bare)
